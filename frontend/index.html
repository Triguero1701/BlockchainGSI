<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trazabilidad Blockchain | Queso Manchego</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Archivo de estilos propio -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <!-- Panel Lateral -->
        <aside class="sidebar">
            <header class="header">
                <h1>🧀 Trazabilidad Segura</h1>
                <p>Queso Manchego - Lote #001</p>
            </header>

            <div class="panel actions">
                <h2>Cripto-Auditoría</h2>
                <div style="margin-bottom: 15px;">
                    <label for="tripSelector" style="font-weight: 500; font-size: 0.9rem; display: block; margin-bottom: 5px; color: #8b949e;">Filtrar y Auditar Viaje:</label>
                    <select id="tripSelector" style="width: 100%; padding: 8px; border-radius: 6px; background-color: #21262d; color: #c9d1d9; border: 1px solid #30363d;">
                        <option value="ALL">Todos los viajes</option>
                    </select>
                </div>
                <p class="desc">Haz clic para comprobar en tiempo real que ningún registro off-chain ha sido manipulado ni tergiversado utilizando el núcleo blockchain.</p>
                <button id="btnAuditar" class="btn primary">🔍 Auditar Integridad</button>
                <div id="auditResult" class="alert hidden">
                    <!-- Aquí se inyecta el resultado del servidor -->
                </div>
            </div>

            <div class="panel telemetry">
                <h2>Últimos Bloques (En vivo)</h2>
                <div id="blocksFeed" class="feed">
                    <!-- Los bloques se inyectarán aquí dinámicamente -->
                </div>
            </div>
        </aside>

        <!-- Contenido principal (Mapa) -->
        <main class="main-content">
            <div id="map"></div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Lógica de la app -->
    <script src="app.js"></script>
</body>
</html>
